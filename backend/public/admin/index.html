<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ember & Ash — CMS Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#333;--gold:#c9a84c;--gold2:#e8c97a;--cream:#f5efe6;--muted:#888;--green:#2ecc71;--red:#e74c3c;--blue:#3498db}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header h1{font-size:1.2rem;color:var(--gold);font-weight:600}
.header h1 span{color:var(--cream);font-weight:400}
.header-right{display:flex;align-items:center;gap:1rem;font-size:.82rem;color:var(--muted)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;gap:0;overflow-x:auto}
.tab{padding:1rem 1.5rem;border:none;background:none;color:var(--muted);cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:500;letter-spacing:.03em;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--cream)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* CONTENT */
.content{padding:2rem;max-width:1200px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

/* TOOLBAR */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.toolbar h2{font-size:1.3rem;font-weight:600}
.btn{padding:.6rem 1.2rem;border:none;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;letter-spacing:.03em;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem}
.btn-gold{background:var(--gold);color:#111}
.btn-gold:hover{background:var(--gold2)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.85}
.btn-outline{background:none;border:1px solid var(--border);color:var(--cream)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:.4rem .8rem;font-size:.75rem}

/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);text-align:left;padding:.75rem 1rem;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:middle}
tr:hover{background:rgba(201,168,76,.04)}
.img-thumb{width:60px;height:40px;object-fit:cover;border-radius:2px;border:1px solid var(--border)}

/* BADGE */
.badge{font-size:.7rem;padding:.2rem .6rem;border-radius:2px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.badge-pending{background:rgba(241,196,15,.15);color:#f1c40f}
.badge-confirmed{background:rgba(46,204,113,.15);color:var(--green)}
.badge-cancelled{background:rgba(231,76,60,.15);color:var(--red)}

/* MODAL */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:2rem}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:2rem}
.modal h3{font-size:1.1rem;margin-bottom:1.5rem;color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500}
.form-group input,.form-group select,.form-group textarea{background:var(--surface2);border:1px solid var(--border);color:var(--cream);padding:.65rem .8rem;font-family:inherit;font-size:.88rem;outline:none;transition:border-color .2s;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:80px}
.form-group select option{background:var(--surface2)}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);padding:1.5rem;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700;color:var(--gold);line-height:1}
.stat-card .label{font-size:.75rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:.4rem}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}

@media(max-width:600px){
  .form-row{grid-template-columns:1fr}
  .content{padding:1rem}
  .tabs{padding:0 1rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>🔥 Ember & Ash <span>— CMS</span></h1>
  <div class="header-right">
    <span id="item-count"></span>
    <a href="/restaurant.html" target="_blank" class="btn btn-outline btn-sm">View Site →</a>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="menu">Menu Items</button>
  <button class="tab" data-tab="reservations">Reservations</button>
  <button class="tab" data-tab="testimonials">Testimonials</button>
  <button class="tab" data-tab="hours">Hours</button>
</div>

<div class="content">
  <!-- MENU PANEL -->
  <div class="panel active" id="panel-menu">
    <div class="toolbar">
      <h2>Menu Items</h2>
      <button class="btn btn-gold" onclick="openMenuModal()">+ Add Item</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Tag</th><th>Actions</th></tr>
        </thead>
        <tbody id="menu-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- RESERVATIONS PANEL -->
  <div class="panel" id="panel-reservations">
    <div class="stats-row" id="res-stats"></div>
    <div class="toolbar">
      <h2>Reservations</h2>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Email</th><th>Date</th><th>Time</th><th>Guests</th><th>Occasion</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="res-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- TESTIMONIALS PANEL -->
  <div class="panel" id="panel-testimonials">
    <div class="toolbar">
      <h2>Testimonials</h2>
      <button class="btn btn-gold" onclick="openTestiModal()">+ Add Testimonial</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Role</th><th>Rating</th><th>Text</th><th>Active</th><th>Actions</th></tr>
        </thead>
        <tbody id="testi-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- HOURS PANEL -->
  <div class="panel" id="panel-hours">
    <div class="toolbar">
      <h2>Opening Hours</h2>
      <button class="btn btn-gold" onclick="openHoursModal()">+ Add Hours</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Day Range</th><th>Time</th><th>Note</th><th>Actions</th></tr>
        </thead>
        <tbody id="hours-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-mask" id="modal-mask">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const API = '';

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Modal helpers ──
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-mask').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-mask').classList.remove('show');
}
document.getElementById('modal-mask').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ══════════════════════════════
// MENU
// ══════════════════════════════
async function loadMenu() {
  const items = await (await fetch(API + '/api/menu')).json();
  const tbody = document.getElementById('menu-tbody');
  if (!items.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No menu items yet.</td></tr>'; return; }
  tbody.innerHTML = items.map(i => `
    <tr>
      <td><img src="${i.image_url}" class="img-thumb" alt="${i.name}"/></td>
      <td><strong>${i.name}</strong><br><small style="color:var(--muted)">${i.description.substring(0,50)}…</small></td>
      <td>${i.category}</td>
      <td style="color:var(--gold);font-weight:600">${i.price}</td>
      <td><span class="badge badge-confirmed">${i.tag}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editMenu(${i.id})">Edit</button>
        <button class="btn btn-red btn-sm" onclick="deleteMenu(${i.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

function openMenuModal(item = null) {
  const isEdit = !!item;
  showModal(`
    <h3>${isEdit ? 'Edit' : 'Add'} Menu Item</h3>
    <form onsubmit="saveMenu(event, ${item ? item.id : 'null'})">
      <div class="form-row">
        <div class="form-group"><label>Name</label><input name="name" value="${item?.name || ''}" required/></div>
        <div class="form-group"><label>Price</label><input name="price" value="${item?.price || ''}" required placeholder="$22"/></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select name="category">
            ${['Starters','Mains','Desserts','Drinks'].map(c => `<option ${item?.category === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Tag</label><input name="tag" value="${item?.tag || ''}" placeholder="Chef's Pick"/></div>
      </div>
      <div class="form-group"><label>Description</label><textarea name="description" required>${item?.description || ''}</textarea></div>
      <div class="form-group"><label>Image URL</label><input name="image_url" value="${item?.image_url || ''}"/></div>
      <div class="form-group"><label>Sort Order</label><input name="sort_order" type="number" value="${item?.sort_order || 0}"/></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-gold">${isEdit ? 'Update' : 'Create'}</button>
      </div>
    </form>
  `);
}

async function editMenu(id) {
  const item = await (await fetch(API + '/api/menu/' + id)).json();
  openMenuModal(item);
}

async function saveMenu(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  data.sort_order = parseInt(data.sort_order) || 0;
  const method = id ? 'PUT' : 'POST';
  const url = id ? API + '/api/menu/' + id : API + '/api/menu';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  closeModal();
  loadMenu();
}

async function deleteMenu(id) {
  if (!confirm('Delete this menu item?')) return;
  await fetch(API + '/api/menu/' + id, { method: 'DELETE' });
  loadMenu();
}

// ══════════════════════════════
// RESERVATIONS
// ══════════════════════════════
async function loadReservations() {
  const items = await (await fetch(API + '/api/reservations')).json();
  const tbody = document.getElementById('res-tbody');

  // Stats
  const pending = items.filter(r => r.status === 'pending').length;
  const confirmed = items.filter(r => r.status === 'confirmed').length;
  const total = items.length;
  document.getElementById('res-stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">Total</div></div>
    <div class="stat-card"><div class="num">${pending}</div><div class="label">Pending</div></div>
    <div class="stat-card"><div class="num">${confirmed}</div><div class="label">Confirmed</div></div>
  `;

  if (!items.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">No reservations yet.</td></tr>'; return; }
  tbody.innerHTML = items.map(r => `
    <tr>
      <td><strong>${r.name}</strong></td>
      <td>${r.email}</td>
      <td>${r.date}</td>
      <td>${r.time}</td>
      <td>${r.guests}</td>
      <td>${r.occasion}</td>
      <td><span class="badge badge-${r.status}">${r.status}</span></td>
      <td>
        <select onchange="updateResStatus(${r.id}, this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--cream);padding:.3rem .5rem;font-size:.78rem">
          ${['pending','confirmed','cancelled'].map(s => `<option ${r.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <button class="btn btn-red btn-sm" onclick="deleteRes(${r.id})" style="margin-left:.5rem">Delete</button>
      </td>
    </tr>
  `).join('');
}

async function updateResStatus(id, status) {
  await fetch(API + '/api/reservations/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
  loadReservations();
}

async function deleteRes(id) {
  if (!confirm('Delete this reservation?')) return;
  await fetch(API + '/api/reservations/' + id, { method: 'DELETE' });
  loadReservations();
}

// ══════════════════════════════
// TESTIMONIALS
// ══════════════════════════════
async function loadTestimonials() {
  const items = await (await fetch(API + '/api/testimonials')).json();
  const tbody = document.getElementById('testi-tbody');
  if (!items.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No testimonials yet.</td></tr>'; return; }
  tbody.innerHTML = items.map(t => `
    <tr>
      <td><strong>${t.name}</strong></td>
      <td>${t.role}</td>
      <td>${'★'.repeat(t.rating)}${'☆'.repeat(5-t.rating)}</td>
      <td style="max-width:300px">${t.text.substring(0,80)}…</td>
      <td>${t.active ? '<span class="badge badge-confirmed">Yes</span>' : '<span class="badge badge-cancelled">No</span>'}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editTesti(${t.id})">Edit</button>
        <button class="btn btn-red btn-sm" onclick="deleteTesti(${t.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

function openTestiModal(item = null) {
  const isEdit = !!item;
  showModal(`
    <h3>${isEdit ? 'Edit' : 'Add'} Testimonial</h3>
    <form onsubmit="saveTesti(event, ${item ? item.id : 'null'})">
      <div class="form-row">
        <div class="form-group"><label>Name</label><input name="name" value="${item?.name || ''}" required/></div>
        <div class="form-group"><label>Role</label><input name="role" value="${item?.role || ''}" placeholder="Food Critic"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Rating (1-5)</label><input name="rating" type="number" min="1" max="5" value="${item?.rating || 5}"/></div>
        <div class="form-group"><label>Initials</label><input name="initials" value="${item?.initials || ''}" placeholder="SL" maxlength="3"/></div>
      </div>
      <div class="form-group"><label>Review Text</label><textarea name="text" required>${item?.text || ''}</textarea></div>
      ${isEdit ? `
        <div class="form-group">
          <label>Active</label>
          <select name="active"><option value="1" ${item?.active?'selected':''}>Yes</option><option value="0" ${!item?.active?'selected':''}>No</option></select>
        </div>
      ` : ''}
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-gold">${isEdit ? 'Update' : 'Create'}</button>
      </div>
    </form>
  `);
}

async function editTesti(id) {
  const item = await (await fetch(API + '/api/testimonials/' + id)).json();
  openTestiModal(item);
}

async function saveTesti(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  data.rating = parseInt(data.rating) || 5;
  if (data.active !== undefined) data.active = parseInt(data.active);
  const method = id ? 'PUT' : 'POST';
  const url = id ? API + '/api/testimonials/' + id : API + '/api/testimonials';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  closeModal();
  loadTestimonials();
}

async function deleteTesti(id) {
  if (!confirm('Delete this testimonial?')) return;
  await fetch(API + '/api/testimonials/' + id, { method: 'DELETE' });
  loadTestimonials();
}

// ══════════════════════════════
// HOURS
// ══════════════════════════════
async function loadHours() {
  const items = await (await fetch(API + '/api/hours')).json();
  const tbody = document.getElementById('hours-tbody');
  if (!items.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No hours entries yet.</td></tr>'; return; }
  tbody.innerHTML = items.map(h => `
    <tr>
      <td><strong>${h.day_range}</strong></td>
      <td style="color:var(--gold)">${h.time}</td>
      <td style="color:var(--muted)">${h.note}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editHours(${h.id})">Edit</button>
        <button class="btn btn-red btn-sm" onclick="deleteHours(${h.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

function openHoursModal(item = null) {
  const isEdit = !!item;
  showModal(`
    <h3>${isEdit ? 'Edit' : 'Add'} Hours</h3>
    <form onsubmit="saveHours(event, ${item ? item.id : 'null'})">
      <div class="form-group"><label>Day Range</label><input name="day_range" value="${item?.day_range || ''}" required placeholder="Monday – Friday"/></div>
      <div class="form-group"><label>Time</label><input name="time" value="${item?.time || ''}" required placeholder="6:00 – 11:00 PM"/></div>
      <div class="form-group"><label>Note</label><input name="note" value="${item?.note || ''}" placeholder="Live jazz from 7:30"/></div>
      <div class="form-group"><label>Sort Order</label><input name="sort_order" type="number" value="${item?.sort_order || 0}"/></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-gold">${isEdit ? 'Update' : 'Create'}</button>
      </div>
    </form>
  `);
}

async function editHours(id) {
  const item = await (await fetch(API + '/api/hours/' + id)).json();
  openHoursModal(item);
}

async function saveHours(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  data.sort_order = parseInt(data.sort_order) || 0;
  const method = id ? 'PUT' : 'POST';
  const url = id ? API + '/api/hours/' + id : API + '/api/hours';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  closeModal();
  loadHours();
}

async function deleteHours(id) {
  if (!confirm('Delete this hours entry?')) return;
  await fetch(API + '/api/hours/' + id, { method: 'DELETE' });
  loadHours();
}

// ── Init ──
loadMenu();
loadReservations();
loadTestimonials();
loadHours();
</script>
</body>
</html>
